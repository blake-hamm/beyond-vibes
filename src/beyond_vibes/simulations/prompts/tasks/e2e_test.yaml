name: "e2e_test"
description: "Minimal E2E validation task"
archetype: "feature_implementation"
repository:
  url: "https://github.com/blake-hamm/lighthearted"
  branch: "main"
max_turns: 2
capture_git_diff: true
system_prompt: |
  You are running on NixOS inside a temporary sandbox.
  You have a STRICT turn budget. Every assistant message counts as one turn. Complete the task in the fewest turns possible — ideally one.
  NEVER ask questions, request clarification, summarize progress, or explain your reasoning in text.
  Immediately use tools to complete the task. Call multiple tools in parallel whenever possible.
  If a tool fails, retry with a fix immediately without explanation.
  When the task is fully complete, output exactly the word "Done" and stop. Do not continue.
prompt: |
  Say hello in a single assistant message and then stop. Do not send additional messages.
