repos:
- repo: local
  hooks:
    - id: ruff
      name: ruff
      entry: ruff check --force-exclude
      language: system
      types_or: [python, pyi, jupyter]
    - id: ruff-format
      name: ruff-format
      entry: ruff format
      language: system
      types_or: [python, pyi, jupyter]
- repo: local
  hooks:
    - id: run-coverage
      name: Run Coverage
      entry: .venv/bin/python -m pytest --cov-fail-under=80
      language: system
      pass_filenames: false
      stages: [pre-commit]
      types_or: [python, pyi, jupyter]
